<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" href="img/flowers.png" type="image/x-icon">
    <title>For You Nicho</title>
</head>
<body>
    <div class="greetings" style="font-size: 3rem; text-align: center;">
        <span id="typewriter"></span><span style="animation: blink 1s infinite;">|</span>
    </div>
    <div class="description" style="margin-top: 20px; opacity: 0; transition: opacity 2s;" id="desc">
        <span>Om ada sesuatu nih buat kamu Nicho...</span>
    </div>
    <div class="button" style="opacity: 0; transition: opacity 2s;" id="btn">
        <button style="padding: 10px 20px; border-radius: 20px; border: none; background: #39c6d6; cursor: pointer;">
            <a href="flower.html" style="color: black; font-weight: bold; text-decoration: none;">Klik di sini ya Nicho ganteng</a>
        </button>
    </div>

    <script>
        // Teks yang mau diketik otomatis (Bisa kamu ganti nama pacarmu)
        const text = "Hai Nicho Ganteng, coba liat ini yaa..."; 
        let i = 0;
        
        function typeWriter() {
            if (i < text.length) {
                document.getElementById("typewriter").innerHTML += text.charAt(i);
                i++;
                setTimeout(typeWriter, 100); // Kecepatan ngetik
            } else {
                // Munculin tombol setelah selesai ngetik
                setTimeout(() => {
                    document.getElementById("desc").style.opacity = 1;
                    document.getElementById("btn").style.opacity = 1;
                }, 500);
            }
        }
        
        // Mulai ngetik saat web dibuka
        window.onload = typeWriter;
        
    </script>
    <style>
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
    </style>
</body>
<div class="love-message">
        <h1>Muachh Nicho</h1>
    </div>

    <style>
        .love-message {
            position: absolute;
            top: 15%; /* Jarak dari atas layar */
            width: 100%;
            text-align: center;
            z-index: 1000;
            pointer-events: none; /* Agar tidak menghalangi klik */
        }
        
        .love-message h1 {
            color: #fff;
            text-shadow: 0 0 20px #ff6b81, 0 0 30px #ff6b81;
            font-family: 'Poppins', sans-serif;
            opacity: 0;
            margin: 0;
            letter-spacing: 3px;
            /* Animasi muncul pelan-pelan */
            animation: fadeInMessage 4s forwards;
            /* Delay 8 detik agar muncul setelah bunga selesai mekar */
            animation-delay: 8s; 
        }

        @keyframes fadeInMessage {
            0% {
                opacity: 0;
                transform: translateY(0);
            }
            100% {
                opacity: 1;
                transform: translateY(20px);
            }
        }
    </style>
</html>
